[workers.coder]
description = "Implements code changes from queue handoffs"
command = "codex exec <handoff_file>"

[workers.reviewer]
description = "Reviews task outputs and suggests fixes"
command = "codex exec <handoff_file>"

[workers.researcher]
description = "Researches sources and produces structured notes"
command = "opencode run <handoff_file>"

[workers.smoke]
description = "Safe smoke-test worker"
# Useful for `jcode queue run-next --worker-profile smoke --dry-run`,
# `--execute`, `--background`, and `jcode queue board --tui` without
# launching a real agent.
command = "echo smoke worker ran task=<task_id> handoff=<handoff_file>"

# In `jcode queue board --tui`, this file controls the valid worker profiles
# when it exists. If `.jcode/workers.toml` is missing, the TUI allows arbitrary
# profile names so tasks can still be captured.
